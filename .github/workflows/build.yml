name: Secure Build Pipeline

on:
  pull_request:
    branches: [ "main" ]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gitleaks Scan
        run: |
          docker run --rm -v ${{ github.workspace }}:/code zricethezav/gitleaks:latest detect --source="/code" --no-git -v

  build-test-security:
    needs: [secrets-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Grant permissions
        run: chmod +x mvnw

      - name: Build
        run: ./mvnw package -DskipTests

      - name: Semgrep SAST
        run: docker run --rm -v $(pwd):/src semgrep/semgrep semgrep scan --config auto --sarif --output report.sarif || true

      - name: Upload SAST report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: report.sarif

      # SCA пропущен (нет плагина)
      - name: SCA (SKIPPED)
        run: |
          mkdir -p target
          echo "SCA skipped" > target/dependency-check-report.html

      - name: Upload SCA Report
        uses: actions/upload-artifact@v4
        with:
          name: sca-report
          path: target/dependency-check-report.html

      - name: DAST Run and Scan
        run: |
          java -jar target/*.jar &
          sleep 30

      - name: Install ffuf
        run: |
          wget https://github.com/ffuf/ffuf/releases/download/v2.1.0/ffuf_2.1.0_linux_amd64.tar.gz
          tar -xzf ffuf_2.1.0_linux_amd64.tar.gz
          sudo mv ffuf /usr/local/bin/

      - name: Web Fuzzing Test
        run: |
          java -jar target/*.jar &
          sleep 45
          printf "login\nregister\ncourses\nstudents\nadmin\nxml\nconfig\napi\nuser\npassword\nroot" > wordlist.txt
          ffuf -u http://localhost:8080/api/FUZZ -w wordlist.txt -mc all -o fuzz-report.json || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            target/dependency-check-report.html
            fuzz-report.json
            target/*.jar